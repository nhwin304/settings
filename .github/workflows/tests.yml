name: Compatibility

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.3'
            laravel: '^11.28'
            filament: '^4.0'
            livewire: '^3.5'
            testbench: '^9.0'
          - php: '8.3'
            laravel: '^11.28'
            filament: '^5.0'
            livewire: '^4.1'
            testbench: '^9.0'
          - php: '8.3'
            laravel: '^12.0'
            filament: '^4.0'
            livewire: '^3.5'
            testbench: '^10.0'
          - php: '8.3'
            laravel: '^12.0'
            filament: '^5.0'
            livewire: '^4.1'
            testbench: '^10.0'
          - php: '8.4'
            laravel: '^12.0'
            filament: '^4.0'
            livewire: '^3.5'
            testbench: '^10.0'
          - php: '8.4'
            laravel: '^12.0'
            filament: '^5.0'
            livewire: '^4.1'
            testbench: '^10.0'

    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }} / Filament ${{ matrix.filament }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, pdo_sqlite
          coverage: none
          tools: composer:v2

      - name: Select framework and Filament versions
        run: |
          composer require --no-interaction --no-update "laravel/framework:${{ matrix.laravel }}" "filament/filament:${{ matrix.filament }}"
          composer require --dev --no-interaction --no-update "livewire/livewire:${{ matrix.livewire }}" "orchestra/testbench:${{ matrix.testbench }}"
          composer update --with-all-dependencies --prefer-dist --no-interaction --no-progress

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Check formatting
        run: composer format:test

      - name: Run static analysis
        run: composer analyse

      - name: Run tests
        run: composer test
