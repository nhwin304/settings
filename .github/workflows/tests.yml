name: Compatibility

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.3'
            laravel: '^11.28'
            filament: '^4.0'
            livewire: '^3.5'
            testbench: '^9.0'
          - php: '8.3'
            laravel: '^11.28'
            filament: '^5.0'
            livewire: '^4.1'
            testbench: '^9.0'
          - php: '8.3'
            laravel: '^12.0'
            filament: '^4.0'
            livewire: '^3.5'
            testbench: '^10.0'
          - php: '8.3'
            laravel: '^12.0'
            filament: '^5.0'
            livewire: '^4.1'
            testbench: '^10.0'
          - php: '8.3'
            laravel: '^13.0'
            filament: '^4.0'
            livewire: '^3.5'
            testbench: '^11.0'
          - php: '8.3'
            laravel: '^13.0'
            filament: '^5.0'
            livewire: '^4.1'
            testbench: '^11.0'
          - php: '8.4'
            laravel: '^11.28'
            filament: '^4.0'
            livewire: '^3.5'
            testbench: '^9.0'
          - php: '8.4'
            laravel: '^11.28'
            filament: '^5.0'
            livewire: '^4.1'
            testbench: '^9.0'
          - php: '8.4'
            laravel: '^12.0'
            filament: '^4.0'
            livewire: '^3.5'
            testbench: '^10.0'
          - php: '8.4'
            laravel: '^12.0'
            filament: '^5.0'
            livewire: '^4.1'
            testbench: '^10.0'
          - php: '8.4'
            laravel: '^13.0'
            filament: '^4.0'
            livewire: '^3.5'
            testbench: '^11.0'
          - php: '8.4'
            laravel: '^13.0'
            filament: '^5.0'
            livewire: '^4.1'
            testbench: '^11.0'

    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }} / Filament ${{ matrix.filament }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, pdo_sqlite
          coverage: none
          tools: composer:v2

      - name: Select dependency versions
        run: |
          composer update \
            "laravel/framework:${{ matrix.laravel }}" \
            "filament/filament:${{ matrix.filament }}" \
            "livewire/livewire:${{ matrix.livewire }}" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            --with-all-dependencies --prefer-dist --no-interaction --no-progress

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Check formatting
        run: composer format:test

      - name: Run static analysis
        run: composer analyse

      - name: Run tests
        run: composer test

  prefer-lowest:
    runs-on: ubuntu-latest
    env:
      COMPOSER: composer.lowest.json
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.3'
            laravel: '^11.28'
            filament: '^4.0'
            livewire: '^3.5'
            testbench: '^9.0'
          - php: '8.3'
            laravel: '^11.28'
            filament: '^5.0'
            livewire: '^4.1'
            testbench: '^9.0'

    name: Lowest / PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }} / Filament ${{ matrix.filament }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, pdo_sqlite
          coverage: none
          tools: composer:v2

      - name: Pin lower-bound constraints
        run: |
          cp composer.json composer.lowest.json
          composer require --no-update \
            "laravel/framework:${{ matrix.laravel }}" \
            "filament/filament:${{ matrix.filament }}" \
            "livewire/livewire:${{ matrix.livewire }}"
          composer require --dev --no-update \
            "orchestra/testbench:${{ matrix.testbench }}"

      - name: Install lowest compatible dependencies
        run: |
          composer update \
            --prefer-lowest --prefer-stable --with-all-dependencies \
            --no-interaction --no-progress

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Check formatting
        run: composer format:test

      - name: Run static analysis
        run: composer analyse

      - name: Run tests
        run: composer test
